<!DOCTYPE html>

<html>
    <head>
    <title>Alex simon sianturi-2473036</title>
    <script type="text/javascript">
        function count() {
            var angkapertama = document.getElementById("angka1").value;
            var angkakedua = document.getElementById("angka2").value;

            if (angkapertama === ""&& angkakedua === "") {
                alert("angka pertama dan kedua harus angka");
                return;
            }

            if (isNaN(angkapertama)&& isNaN(angkakedua)) {
                alert("angka pertama dan kedua harus angka.");
                return;
            }else if (isNaN(angkapertama)) {
                alert("angka pertama bukan angka.");
                return;
            } else if (isNaN(angkakedua)) {
                alert("angka kedua harus angka.");
                return;
            }

            angkapertama = parseInt(angkapertama, 10);
            angkakedua = parseInt(angkakedua, 10);

            var hasilPenjumlahan = angkapertama + angkakedua;
            var hasilPengurangan = angkapertama - angkakedua;

            document.getElementById("tambah1").innerHTML = angkapertama;
            document.getElementById("tambah2").innerHTML = angkakedua;
            document.getElementById("hasil1").innerHTML = hasilPenjumlahan;

            document.getElementById("kurang1").innerHTML = angkapertama;
            document.getElementById("kurang2").innerHTML = angkakedua;
            document.getElementById("hasil2").innerHTML = hasilPengurangan;
        }
    </script>
    <style>
        .inputgrup{
            margin-bottom: 10px;
        }

        .inputgrup label{
            display: inline-block;
            width: 150px;
        }

        table{
            border-collapse: collapse;
            margin-top: 10px;
        }

        td {
            border: 2px solid black;
            width: 60px;
            height: 40px;
            text-align: center;
            font-size: 5px;
        }
    </style>
    </head>
    <body>
        <div class="inputgrup">
            <label>Angka Pertama :</label>
            <input type="text" id="angka1">
        </div>
        <div class="inputgrup">
            <label>Angka Kedua :</label>
            <input type="text" id="angka2">
        </div>

        <button onclick="count()">Count</button>

        <table>
            <tr>
                <td id="tambah1"></td>
                <td>+</td>
                <td id="tambah2"></td>
                <td>=</td>
                <td id="hasil1"></td>
            </tr>
            <tr>
                <td id="kurang1"></td>
                <td>-</td>
                <td id="kurang2"></td>
                <td>=</td>
                <td id="hasil2"></td>
            </tr>
        </table>
    </body>
</html>
