<!DOCTYPE html>

<html>
    <head>
        <title>2473036-Alex simon sianturi</title>
    </head>
    <body>
        <table style="border: 2px solid black;"width ="380" cellpadding ="0" cellspacing ="0">
            <form>
                <tr>
                    <td colspan="3" align="center">
                        <h1><b>Form Tambah Data User</b></h1>
                    </td>
                </tr>

                <tr>
                    <td style="width: 120px;">Name</td>
                    <td>:
                    <input type="text" name="Name" required oninvalid="this.setCustomValidity('Name is required!!!!')" oninput="this.setCustomValidity('')">
                </td>
                </tr>

                <tr>
                    <td>Addres</td>
                    <td>: 
                    <input type="text" name="Address" required oninvalid="this.setCustomValidity('Address is required!!')" oninput="this.setCustomValidity('')">
                    </td>
                </tr>

                <tr>
                    <td>Email</td>
                    <td>:
                    <input type="email" name="Email" required oninvalid="this.setCustomValidity('Harap isi bidang ini.')" oninput="this.setCustomValidity('')">
                    </td>
                </tr>
                
                <tr>
                    <td>Home page</td>
                    <td>:
                    <input type="url" name="homepage">
                    </td>
                </tr>

                <tr>
                    <td>Birthday</td>
                    <td>:
                    <input type="date" name="birthday">
                    </td>
                </tr>

                <tr>
                    <td>Favorite Color</td>
                    <td>:
                    <input type="color" name="favorite color">
                    </td>
                </tr>

                <tr>
                    <td>IPK</td>
                    <td>:
                    <input type="number" name="ipk" min="0" max="4" step="0.1" value="0">
                    </td>
                </tr>

                <tr>
                    <td>Phone Number</td>
                    <td>:
                    <input type="text" name="Phonenumber" pattern="[0-9]{3}-[0-9]{7,10}" title=" format :###-####### or ###-##########">
                    </td>
                </tr>

                <tr>
                    <td colspan="2" align="center" >
                        <input type="submit" value="add">
                    </td>
                </tr>
            </form>
        </table>
    </body>
</html>
